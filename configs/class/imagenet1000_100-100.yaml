hydra:
  run:
    dir: ./experiments/${scenario}/${dataset}_${initial_increment}-${increment}
  job:
    chdir: true

  job_logging:
    version: 1
    formatters:
      simple:
        format: '%(message)s'

class_order: ""
dataset_root: ""
workdir: ""
log_path: "metrics.json"
model_name: "ViT-B/16"
prompt_template: "a good photo of a {}."

batch_size: 64
initial_increment: 100  
increment: ${initial_increment}
scenario: "class"
dataset: "imagenet1000"
task_num: 10

epochs: 1
train_batch_size: 80
num_workers: 6
lora_rank: 8
lora_mode: "vision+only_kv+text"
lr: 0.0005
reset: False
only_reset_B: False
freeze_A: False
all_test: False
weight_decay: 1e-4
momentum: 0.9
seed: 0


visual_clsf: true
visual_clsf_lr: 0.0005
visual_clsf_batch_size: 64
visual_clsf_epochs: 2

real_replay: false

balance_ft: false
balance_epochs: 1
